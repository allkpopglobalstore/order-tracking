<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.top {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 20px;
}

input, select {
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

button {
  padding: 12px 16px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.status {
  padding: 5px 10px;
  border-radius: 20px;
  color: white;
  font-size: 12px;
}

/* TRACKING STYLE */
.step {
  display: flex;
  gap: 10px;
  margin: 6px 0;
  font-size: 13px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ccc;
}

.done { background: #2ecc71; }
.active { background: #3498db; }

</style>
</head>

<body>

<div class="container">

  <div class="top">
    <input id="userid" placeholder="User ID">
    <select id="month">
      <option value="">All Months</option>
      <option>MAY</option>
      <option>JUNE</option>
      <option>JULY</option>
      <option>AUGUST</option>
    </select>
    <button onclick="search()">Search</button>
  </div>

  <div id="results"></div>

</div>

<script>

const steps = [
  "TO BUY",
  "PURCHASED",
  "IN WAREHOUSE CH",
  "IN WAREHOUSE KR",
  "IN TRANSIT TO ES",
  "IN SPAIN",
  "DELIVERED"
];

// 🔥 CONECTA A TU APPS SCRIPT
const API_URL = "https://script.google.com/macros/s/AKfycbz80y4d-Ot7gRRKQBr0HZ_iO4stEpMIAMC6NjPy5dOiwXRzHkPkzKsmFq97cPWcf9i_/exec";

function search() {

  const userId = document.getElementById("userid").value;
  const month = document.getElementById("month").value;

  document.getElementById("results").innerHTML = "Loading...";

  fetch(API_URL + "?userId=" + userId)
    .then(res => res.json())
    .then(data => render(data, month));
}

function render(data, month) {

  if (!data || data.length === 0) {
    document.getElementById("results").innerHTML = "<div class='card'>No orders</div>";
    return;
  }

  if (month) {
    data = data.filter(d => (d.MES || "").toUpperCase() === month);
  }

  let html = "";

  data.forEach(o => {

    html += `<div class="card">
      <b>${o.PRODUCTO || "Order"}</b><br><br>
      Status: ${o.STATUS || "-"}
      <div style="margin-top:10px;">
        ${renderSteps(o.STATUS)}
      </div>
    </div>`;
  });

  document.getElementById("results").innerHTML = html;
}

function renderSteps(status) {

  let i = steps.indexOf(status || "");
  let html = "";

  steps.forEach((s, index) => {

    let cls = "dot";
    if (index < i) cls = "dot done";
    if (index === i) cls = "dot active";

    html += `
      <div class="step">
        <div class="${cls}"></div>
        <div>${s}</div>
      </div>
    `;
  });

  return html;
}

</script>

</body>
</html>
